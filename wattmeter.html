<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dima Power Graph PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; text-align: center; }
        .header { padding: 15px; background: #111; border-bottom: 2px solid #0f0; display: flex; justify-content: space-between; align-items: center; }
        #val { font-size: 64px; font-weight: bold; text-shadow: 0 0 15px #0f0; }
        .btn { background: #0f0; color: #000; border: none; padding: 15px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 16px; }
        .container { height: 80vh; width: 98vw; margin: auto; }
        .info { font-size: 12px; color: #444; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn" onclick="connect()">CONNECT ARDUINO</button>
    <div id="val">0 W</div>
    <div class="info">ZOOM: Wheel | SCROLL: Drag | RESET: Double Click</div>
</div>

<div class="container">
    <canvas id="chart"></canvas>
</div>

<script>
let chart;
let isPaused = false;
let buffer = "";

async function connect() {
    try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        const reader = port.readable.getReader();
        initChart();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            
            buffer += new TextDecoder().decode(value);
            let lines = buffer.split("\n");
            buffer = lines.pop(); // Храним неполную строку

            for (let line of lines) {
                let watts = parseFloat(line.trim());
                if (!isNaN(watts)) {
                    updateUI(watts);
                }
            }
        }
    } catch (e) { console.error(e); }
}

function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: '#0f0', borderWidth: 2, pointRadius: 0, fill: false, tension: 0.1 }] },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: {
                x: { display: false },
                y: { grid: { color: '#1a1a1a' }, ticks: { color: '#0f0' }, beginAtZero: true }
            },
            plugins: {
                zoom: {
                    pan: { enabled: true, mode: 'x', onPanStart: () => isPaused = true },
                    zoom: { wheel: { enabled: true }, mode: 'x' }
                }
            }
        }
    });
}

function updateUI(w) {
    document.getElementById('val').innerText = Math.round(w) + " W";
    chart.data.labels.push("");
    chart.data.datasets[0].data.push(w);

    // Авто-скролл, если юзер не трогает график
    if (!isPaused) {
        const len = chart.data.labels.length;
        if (len > 100) {
            chart.options.scales.x.min = len - 100;
            chart.options.scales.x.max = len - 1;
        }
    }
    chart.update('none');
}

// Сброс паузы и зума по двойному клику
document.ondblclick = () => { isPaused = false; chart.resetZoom(); };
</script>
</body>
</html>
